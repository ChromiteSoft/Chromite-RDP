<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Chromite RDP</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2828;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Бічна панель (Список серверів) */
        #sidebar {
            width: 320px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        #sidebar.hidden {
            transform: translateX(-100%);
            position: absolute;
            height: 100%;
        }

        /* Заголовок сайдбару та верхня панель мають однакову висоту для рівної лінії */
        .sidebar-header,
        #toolbar {
            height: 64px;
            box-sizing: border-box;
        }

        .sidebar-header {
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .server-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .server-item {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .server-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        .server-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .server-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .server-ip {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: monospace;
        }

        .delete-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 6px;
            border-radius: 4px;
        }

        .delete-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .add-server-form {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-dark);
            color: var(--text-main);
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button.danger {
            background: var(--danger);
        }

        button.danger:hover {
            background: var(--danger-hover);
        }

        /* Основний робочий простір */
        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #toolbar {
            padding: 0 24px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .toggle-sidebar-btn {
            background: transparent;
            padding: 8px;
            border: 1px solid var(--border-color);
        }

        .toggle-sidebar-btn:hover {
            background: var(--bg-dark);
            border-color: var(--text-muted);
        }

        #activeServerDisplay {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        #statusPanel {
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
            box-shadow: 0 0 8px currentColor;
        }

        .status-connected .status-dot {
            background: var(--success);
        }

        .status-error .status-dot {
            background: var(--danger);
        }

        .status-connected {
            color: var(--success);
        }

        .status-error {
            color: var(--danger);
        }

        /* Canvas Wrapper */
        #workspace {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
        }

        canvas {
            background: #111;
            box-shadow: 0 0 40px rgba(0, 0, 0, 1);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: box-shadow 0.3s ease;
        }

        /* Overlay Fullscreen Mode */
        body.fullscreen #sidebar {
            display: none;
        }

        body.fullscreen #toolbar {
            position: absolute;
            top: -100px;
            width: 100%;
            transition: top 0.3s;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
        }

        body.fullscreen #toolbar:hover {
            top: 0;
        }

        body.fullscreen #workspace {
            position: fixed;
            inset: 0;
        }

        body.fullscreen canvas {
            width: 100vw !important;
            height: 100vh !important;
            max-width: none;
            max-height: none;
            object-fit: fill;
            box-shadow: none;
        }

        #fullscreenBtn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Splash Screen (коли немає підключення) */
        #splash {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            pointer-events: none;
        }

        #splash svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        #splash h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 500;
        }

        #splash p {
            margin-top: 8px;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

    <!-- Бічна панель -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Мої Сервери</h2>
        </div>

        <div class="server-list" id="serverList">
            <!-- Сюди будуть додаватись сервери динамічно -->
        </div>

        <div class="add-server-form">
            <input type="text" id="newName" placeholder="Назва (напр. Домашній ПК)" autocomplete="off">
            <input type="text" id="newIp" placeholder="IP адреса (напр. 192.168.1.100)" autocomplete="off">
            <button id="addServerBtn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14m-7-7h14"></path>
                </svg>
                Зберегти сервер
            </button>
        </div>

        <div
            style="text-align: center; margin-bottom: 8px; margin-top: auto; font-size: 0.65rem; color: rgba(148, 163, 184, 0.3); letter-spacing: 0.5px;">
            by Tyosensya
        </div>
    </div>

    <!-- Основна зона -->
    <div id="main-area">
        <div id="toolbar">
            <div class="toolbar-left">
                <button class="toggle-sidebar-btn" id="toggleSbBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div id="activeServerDisplay">Оберіть сервер</div>
            </div>

            <div class="toolbar-right">
                <div id="statusPanel" class="status-warning">
                    <div class="status-dot"></div>
                    <span id="statusText">Очікування...</span>
                </div>

                <button id="disconnectBtn" class="danger" style="display: none;">Відключитись</button>
                <button id="fullscreenBtn" title="На весь екран">
                    <svg viewBox="0 0 24 24">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="workspace">
            <div id="splash">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
                <h1>Chromite RDP</h1>
                <p>Оберіть сервер у бічній панелі для підключення</p>
            </div>
            <canvas id="rdpDisplay" width="1024" height="768" style="display: none;"></canvas>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
